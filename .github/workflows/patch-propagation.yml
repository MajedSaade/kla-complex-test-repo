name: Patch Propagation CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      work_item:
        description: 'Work item ID (without brackets)'
        required: false
        default: 'WI-440219'
        type: string
      branch_select_mode:
        description: 'Branch selection strategy'
        required: false
        default: 'wi-history'
        type: choice
        options:
          - wi-history
          - affected-file

env:
  WI_ID: ${{ github.event.inputs.work_item || 'WI-440219' }}
  BRANCH_SELECT_MODE: ${{ github.event.inputs.branch_select_mode || 'wi-history' }}

permissions:
  contents: read

jobs:
  # Self-contained: builds a fresh fixture, propagates, and verifies in one
  # checkout. Needs no secrets and is the gate that must always pass.
  full-integration:
    name: Full integration (generate → propagate → verify)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Make scripts executable
        run: chmod +x generate_complex_repo.sh scripts/*.sh

      - name: Generate fresh fixture from scratch
        run: |
          unset GIT_DIR GIT_WORK_TREE GIT_OBJECT_DIRECTORY GIT_ALTERNATE_OBJECT_DIRECTORIES GIT_COMMON_DIR || true
          ./generate_complex_repo.sh ./.generated-fixture

      - name: Propagate definitive fix (direct mode)
        env:
          PROPAGATION_MODE: direct
        run: ./scripts/propagate_patch.sh ./.generated-fixture

      - name: Verify propagation outcomes
        run: ./scripts/verify_propagation.sh ./.generated-fixture

      - name: Stage propagation logs for artifact upload
        if: always()
        run: |
          mkdir -p ci-artifacts/integration
          if [[ -d .generated-fixture/.propagation-logs ]]; then
            cp -r .generated-fixture/.propagation-logs/. ci-artifacts/integration/ 2>/dev/null || true
          fi
          [[ -f ci-artifacts/integration/propagation-summary.txt ]] \
            || echo "No integration logs generated" > ci-artifacts/integration/propagation-summary.txt

      - name: Upload propagation summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-summary-${{ github.run_number }}
          path: ci-artifacts/integration/
          if-no-files-found: warn

  # Opens real PRs on this repo. The default GITHUB_TOKEN cannot create pull
  # requests, so this job needs a PAT stored as the PROPAGATION_TOKEN secret.
  # Without it the job is skipped (with a notice) instead of failing the build.
  live-repo-prs:
    name: Live repo (open PRs for WI branches)
    runs-on: ubuntu-latest
    needs: full-integration

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check for propagation token
        id: token
        env:
          PROPAGATION_TOKEN: ${{ secrets.PROPAGATION_TOKEN }}
        run: |
          if [[ -n "${PROPAGATION_TOKEN}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Live PRs skipped::Set a PAT secret named PROPAGATION_TOKEN (with repo + pull-request scope) to enable automatic PR creation. The default GITHUB_TOKEN is not permitted to open pull requests."
          fi

      - name: Checkout all branches
        if: steps.token.outputs.enabled == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure git and GitHub CLI
        if: steps.token.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.PROPAGATION_TOKEN }}
        run: |
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Make scripts executable
        if: steps.token.outputs.enabled == 'true'
        run: chmod +x scripts/*.sh

      - name: Open pull requests for matching branches
        if: steps.token.outputs.enabled == 'true'
        env:
          PROPAGATION_MODE: pr
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.PROPAGATION_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PROPAGATION_TOKEN }}
        run: ./scripts/propagate_patch.sh .

      - name: Verify pull requests were opened
        if: steps.token.outputs.enabled == 'true'
        env:
          PROPAGATION_MODE: pr
        run: ./scripts/verify_propagation.sh .

      - name: Notify (email + run summary) of propagation outcome
        if: always() && steps.token.outputs.enabled == 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_EMAIL_FROM: ${{ secrets.NOTIFY_EMAIL_FROM }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SECURITY: ${{ secrets.SMTP_SECURITY }}
        run: ./scripts/notify_propagation.sh .

      - name: Stage PR propagation logs
        if: always() && steps.token.outputs.enabled == 'true'
        run: |
          mkdir -p ci-artifacts/live-prs
          if [[ -d .propagation-logs ]]; then
            cp -r .propagation-logs/. ci-artifacts/live-prs/ 2>/dev/null || true
          fi
          [[ -f ci-artifacts/live-prs/propagation-summary.txt ]] \
            || echo "No live PR logs generated" > ci-artifacts/live-prs/propagation-summary.txt

      - name: Upload PR propagation summary
        if: always() && steps.token.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: live-pr-summary-${{ github.run_number }}
          path: ci-artifacts/live-prs/
          if-no-files-found: warn

      - name: List open propagation PRs
        if: steps.token.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.PROPAGATION_TOKEN }}
        run: |
          echo "Open propagation PRs:"
          gh pr list --search "Propagate [${WI_ID}] in:title" --state open \
            --json number,title,url,baseRefName,headRefName \
            --jq '.[] | "\(.number) \(.baseRefName) <- \(.headRefName) \(.url)"'
